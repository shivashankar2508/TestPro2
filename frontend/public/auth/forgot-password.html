<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TestTrack Pro</title>
    <link rel="stylesheet" href="/styles/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">🧪</div>
                <h1>TestTrack Pro</h1>
                <p>Password Reset</p>
            </div>

            <div class="success-message" style="display:block; text-align:center; margin-bottom: 16px;">
                Password reset flow is not configured yet.
            </div>

            <p style="text-align:center; color:#666; margin-bottom:20px;">
                Contact your administrator or use OAuth login while this feature is being set up.
            </p>

            <a href="/login" class="btn btn-primary btn-block"
                style="text-align:center; display:block; text-decoration:none;">
                Back to Sign In
            </a>
        </div>
    </div>
</body>

</html>
