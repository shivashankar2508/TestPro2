version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: testtrack-db
    environment:
      POSTGRES_USER: ${DB_USER:-testtrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testtrack123}
      POSTGRES_DB: ${DB_NAME:-testtrack_pro}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-testtrack}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: testtrack-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-testtrack}:${DB_PASSWORD:-testtrack123}@db:5432/${DB_NAME:-testtrack_pro}
      ENV: ${ENV:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: testtrack-web
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: testtrack-dashboard
    environment:
      API_URL: http://backend:8000/api
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      - backend
    volumes:
      - ./dashboard:/app

volumes:
  postgres_data:
